name: Deploy to GitHub Pages

# Builds and publishes the site on every push to main. Adding a new article
# is just a new .mdx file under content/articles/ — pushing it triggers this
# workflow, which rebuilds the whole static site (including the new
# article's own page) and republishes the gh-pages branch automatically.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # If deploying to https://<user>.github.io/<repo>/ (a project page),
      # uncomment the line below so built asset paths include the repo name.
      # Leave commented for a custom domain or a <user>.github.io user page.
      # - run: echo "NEXT_PUBLIC_BASE_PATH=/${{ github.event.repository.name }}" >> "$GITHUB_ENV"

      - run: npm run build

      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
